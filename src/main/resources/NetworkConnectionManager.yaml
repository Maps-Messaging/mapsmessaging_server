---
NetworkConnectionManager:
    global:
        selector_pool_size: 5

        # ---------------------------------------------------------------------------------------------------------
        # tcp layer configuration
        # ---------------------------------------------------------------------------------------------------------
        receiveBufferSize: 1M
        sendBufferSize: 1M
        timeout: 60000

        readDelayOnFragmentation: 100
        enableReadDelayOnFragmentation: true

        # ---------------------------------------------------------------------------------------------------------
        # Generic protocol configuration
        # ---------------------------------------------------------------------------------------------------------
        serverReadBufferSize:  1M
        serverWriteBufferSize: 1M
        selectorThreadCount  : 5

        security:
          tls:
            context: TLSv1.3
            clientCertificateRequired: true
            clientCertificateWanted: true
            keyStore:
              type: PKCS12
              alias: bedrooms
              managerFactory: SunX509
              path: C:\Users\matthew\Downloads\bedrooms-keystore.p12
              passphrase: changeit
            trustStore:
              type: PKCS12
              path: C:\Users\matthew\Downloads\mosquitto-truststore.p12
              passphrase: changeit
              managerFactory: SunX509

    data:

      -
        name: mosquitto-bridge
        url: "ssl://ros02.syd.mapsmessaging.io:8883"
        protocol: mqtt
        plugin: false
        remote:
          sessionId: "mosquitto-bridge"
        maxServerKeepAlive: 10
        serverMaximumTopicAlias: 100
        clientMaximumTopicAlias: 100
        links:
          -
            direction: pull
            remote_namespace: "test"
            local_namespace: "test"
            include_schema: false
          -
            direction: push
            remote_namespace: "/large/folder/test/to/see/if/it/works"
            local_namespace: "/mosquitto-bridge/test"
            include_schema: false
